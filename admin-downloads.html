<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <title>ARF PDF download counter (admin)</title>
    <style>
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        margin: 0;
        background: #0b1220;
        color: #eaf0ff;
      }
      main {
        max-width: 760px;
        margin: 3rem auto;
        padding: 1.25rem 1.25rem;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 12px;
      }
      h1 {
        font-size: 1.1rem;
        margin: 0 0 1rem 0;
      }
      label {
        display: block;
        margin: 0.75rem 0 0.35rem 0;
        font-weight: 600;
      }
      input {
        width: 100%;
        padding: 0.6rem 0.7rem;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: rgba(255, 255, 255, 0.06);
        color: #eaf0ff;
      }
      button {
        margin-top: 0.9rem;
        padding: 0.6rem 0.8rem;
        border-radius: 10px;
        border: 0;
        background: #3b82f6;
        color: #fff;
        font-weight: 700;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .hint {
        opacity: 0.85;
        font-size: 0.95rem;
        margin-top: 0.5rem;
      }
      pre {
        background: rgba(0, 0, 0, 0.25);
        padding: 0.75rem;
        border-radius: 10px;
        overflow: auto;
      }
      .daily-wrap {
        margin: 0.75rem 0 0 0;
        overflow: auto;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.12);
      }
      table.daily {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.92rem;
      }
      table.daily th,
      table.daily td {
        padding: 0.45rem 0.6rem;
        text-align: left;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }
      table.daily th {
        background: rgba(0, 0, 0, 0.2);
        font-weight: 600;
      }
      table.daily tr:last-child td {
        border-bottom: 0;
      }
      table.daily td.num {
        text-align: right;
        font-variant-numeric: tabular-nums;
      }
      table.daily tr.zero td {
        opacity: 0.55;
      }
      .daily-caption {
        font-size: 0.85rem;
        opacity: 0.8;
        margin: 0.35rem 0 0 0;
      }
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>ARF PDF download counter (admin)</h1>

      <p class="hint" style="margin-top: 0">
        Counter endpoint (fixed, same as the main app):
        <code id="baseDisplay"></code>
      </p>

      <label for="token">Admin token</label>
      <input id="token" type="password" autocomplete="current-password" placeholder="ADMIN_TOKEN" />

      <p class="hint" style="margin-top: 0.75rem">
        Daily table uses <strong>US Eastern</strong> calendar dates (<code>America/New_York</code>). Query: last
        <label for="days" class="sr-only">number of days</label>
        <input id="days" type="number" min="1" max="90" value="30" style="width: 4rem; display: inline-block; padding: 0.25rem 0.35rem" />
        days.
      </p>

      <button id="refresh">Refresh</button>

      <h2 style="margin: 1.2rem 0 0.5rem 0; font-size: 1rem">Daily (New York)</h2>
      <div id="dailyWrap" class="daily-wrap" hidden>
        <table class="daily" aria-label="Downloads per US Eastern calendar day">
          <thead>
            <tr>
              <th scope="col">Date (Eastern)</th>
              <th scope="col" style="text-align: right">Downloads</th>
            </tr>
          </thead>
          <tbody id="dailyBody"></tbody>
        </table>
      </div>
      <p id="dailyCaption" class="daily-caption" hidden></p>

      <h2 style="margin: 1.2rem 0 0.5rem 0; font-size: 1rem">Raw JSON</h2>
      <pre id="out">{ "ok": false, "note": "not loaded yet" }</pre>
    </main>

    <script>
      /** Same Worker as `DOWNLOAD_COUNTER_BASE_URL` in app.js — change both if you deploy a new URL. */
      const WORKER_BASE_URL = "https://arf-download-counter.happylot242.workers.dev";

      const els = {
        baseDisplay: document.getElementById("baseDisplay"),
        token: document.getElementById("token"),
        days: document.getElementById("days"),
        refresh: document.getElementById("refresh"),
        dailyWrap: document.getElementById("dailyWrap"),
        dailyBody: document.getElementById("dailyBody"),
        dailyCaption: document.getElementById("dailyCaption"),
        out: document.getElementById("out"),
      };

      els.baseDisplay.textContent = WORKER_BASE_URL;

      function escapeHtml(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function setOut(obj) {
        els.out.textContent = JSON.stringify(obj, null, 2);
      }

      function adminDaysParam() {
        const n = parseInt(String(els.days.value || "30"), 10);
        if (!Number.isFinite(n)) return 30;
        return Math.min(90, Math.max(1, n));
      }

      function renderDailyTable(j) {
        const byDay = j && Array.isArray(j.by_day) ? j.by_day : null;
        if (!byDay || !byDay.length || !j.ok) {
          els.dailyWrap.hidden = true;
          els.dailyCaption.hidden = true;
          els.dailyBody.innerHTML = "";
          return;
        }
        els.dailyBody.innerHTML = "";
        for (const row of byDay) {
          const tr = document.createElement("tr");
          if (Number(row.count) === 0) tr.classList.add("zero");
          tr.innerHTML = `<td>${escapeHtml(row.date)}</td><td class="num">${escapeHtml(String(row.count))}</td>`;
          els.dailyBody.appendChild(tr);
        }
        els.dailyWrap.hidden = false;
        const cap = j.by_day_note || "";
        els.dailyCaption.textContent = cap;
        els.dailyCaption.hidden = !cap;
      }

      async function load() {
        const base = String(WORKER_BASE_URL || "").trim().replace(/\/+$/, "");
        const token = String(els.token.value || "").trim();
        if (!token) return setOut({ ok: false, error: "missing token" });

        const days = adminDaysParam();
        els.days.value = String(days);

        els.refresh.disabled = true;
        try {
          const r = await fetch(`${base}/admin?days=${encodeURIComponent(days)}`, { headers: { "X-Admin-Token": token } });
          const j = await r.json().catch(() => null);
          const payload = { status: r.status, ...(j || {}) };
          setOut(payload);
          renderDailyTable(j || {});
          if (r.status === 200 && j && j.ok && !Array.isArray(j.by_day)) {
            els.dailyWrap.hidden = true;
            els.dailyCaption.textContent =
              "Daily breakdown is not available yet. Redeploy the Worker from this repo’s download-counter-worker folder (npm run deploy), then refresh.";
            els.dailyCaption.hidden = false;
          }
        } catch (e) {
          setOut({ ok: false, error: String(e && e.message ? e.message : e) });
          renderDailyTable({});
        } finally {
          els.refresh.disabled = false;
        }
      }

      els.refresh.addEventListener("click", load);
      els.token.addEventListener("keydown", (e) => {
        if (e.key === "Enter") load();
      });
    </script>
  </body>
</html>
